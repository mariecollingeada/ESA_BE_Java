# --- datasource (defaults for local dev) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/demo_db?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:demo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:demo_pass}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# --- Hikari (connection pool) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# --- Flyway (if using) ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=INFO
logging.level.org.springframework.boot.autoconfigure.flyway=INFO

# --- Actuator (health endpoint for Render) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ?? JWT ????????????????????????????????????????????????????????????????????????
# Must be at least 32 characters for HS256.
# Override APP_JWT_SECRET in production (Render ? Environment Variables).
app.jwt.secret=${APP_JWT_SECRET:change_this_dev_secret_replace_me_32bytes}
# Token lifetime in milliseconds. Default = 24 hours.
app.jwt.ttl-ms=${APP_JWT_TTL_MS:86400000}
