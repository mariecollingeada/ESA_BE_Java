# --- datasource (defaults for local dev) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/demo_db?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:demo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:demo_pass}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Hikari (connection pool) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# --- Flyway (if using) ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- Actuator (health endpoint for Render) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

