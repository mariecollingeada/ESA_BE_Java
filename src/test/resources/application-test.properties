# Test profile - datasource is overridden by @DynamicPropertySource in each test class
# Disable Flyway and let Hibernate create/drop the schema from entities instead
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# SendGrid test config (dummy values for tests)
sendgrid.api-key=test-api-key
sendgrid.from-email=test@example.com

# JWT test config
app.jwt.secret=test-secret-key-that-is-at-least-32-bytes-long
app.jwt.ttl-ms=86400000

cloudinary-url=cloudinary://test:test@test

# Suppress Hibernate logging during tests
spring.jpa.show-sql=false
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
