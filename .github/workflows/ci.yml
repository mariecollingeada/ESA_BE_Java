name: CI - checks & tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  checks:
    name: Lint, style and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'
      
      - name: Cache local m2 repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-
      
      - name: Spotless check (format)
        run: ./mvnw -B com.diffplug.spotless:spotless-maven-plugin:2.43.0:check
      
      - name: Checkstyle
        run: ./mvnw -B checkstyle:check
      
      - name: Run unit tests
        run: ./mvnw -B test
      
      # Optional: produce an artifact to be used later by the deploy workflow.
      - name: Build (package) artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: ./mvnw -B -DskipTests package
      
      - name: Upload artifact (optional)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: demo-jar
          path: target/*.jar