name: CI — tests & build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: demo_db
          POSTGRES_USER: demo_user
          POSTGRES_PASSWORD: demo_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U demo_user -d demo_db"
          --health-interval 10s --health-timeout 5s --health-retries 5
    
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/demo_db?sslmode=disable
      SPRING_DATASOURCE_USERNAME: demo_user
      SPRING_DATASOURCE_PASSWORD: demo_pass
      SPRING_PROFILES_ACTIVE: test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'
      
      - name: Wait for Postgres
        run: |
          echo "Waiting for postgres to be ready..."
          for i in {1..15}; do
            pg_isready -h localhost -p 5432 -U demo_user -d demo_db && break
            sleep 1
          done
        env:
          PGPASSWORD: demo_pass
      
      - name: Show Java & Maven info
        run: |
          java -version
          ./mvnw -v
      
      - name: Run tests (unit + integration)
        run: ./mvnw -B -DskipTests=false verify
      
      - name: Upload build artifact (optional)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar