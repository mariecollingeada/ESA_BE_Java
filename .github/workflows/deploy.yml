name: Deploy (after CI)

on:
  workflow_run:
    workflows: ["CI - checks & tests"]
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Render (only on successful CI for main)
    runs-on: ubuntu-latest
    # Only run if the previous workflow succeeded and was for the main branch.
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Trigger Render deploy (Render builds from the repo)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "Triggering Render deploy for service ${RENDER_SERVICE_ID}"
          curl -s -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            -o /tmp/render-deploy.json -w "\nHTTP_STATUS:%{http_code}\n"
          cat /tmp/render-deploy.json